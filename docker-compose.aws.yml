# GlinTech BOM Insight — full AWS alpha stack (Postgres + API + Next.js production)
#
# On the EC2 instance:
#   cp .env.aws.example .env.aws
#   cp backend/.env.example backend/.env   # add supplier API keys
#   nano .env.aws                          # PUBLIC_HOST + POSTGRES_PASSWORD
#
# Deploy / update:
#   docker compose -f docker-compose.aws.yml --env-file .env.aws up -d --build
#   — or on Windows:  .\scripts\aws-up.ps1
#   — or on Linux:    ./scripts/aws-up.sh
#
# App:    http://<PUBLIC_HOST>:3000
# Health: http://<PUBLIC_HOST>:8000/health

name: glintech-alpha

services:
  db:
    image: postgres:16-alpine
    container_name: glintech_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-glintech}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.aws}
      POSTGRES_DB: ${POSTGRES_DB:-glintech}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-glintech} -d ${POSTGRES_DB:-glintech}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    image: glintech-bom-backend:${IMAGE_TAG:-alpha}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: glintech_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-glintech}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-glintech}
      CORS_ORIGINS: http://${PUBLIC_HOST}:${FRONTEND_PORT:-3000},http://localhost:${FRONTEND_PORT:-3000},http://127.0.0.1:${FRONTEND_PORT:-3000}
      LOCAL_STORAGE_DIR: /data/uploads
      APP_ENV: ${APP_ENV:-alpha}
    command: ["bash", "-c", "sed 's/\\r$//' entrypoint.aws.sh | bash -s"]
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - uploads_data:/data/uploads
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 40s

  frontend:
    image: glintech-bom-frontend:${IMAGE_TAG:-alpha}
    build:
      context: ./frontend
      dockerfile: Dockerfile.aws
      args:
        NEXT_PUBLIC_API_URL: http://${PUBLIC_HOST}:${BACKEND_PORT:-8000}
    container_name: glintech_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      NODE_ENV: production

volumes:
  db_data:
  uploads_data:
